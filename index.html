<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Космический Раннер: Большой Герой</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh; 
            margin: 0;
            background: radial-gradient(circle at center, #0c1020 0%, #05070f 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            user-select: none;
            overflow: hidden;
            touch-action: none; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            box-sizing: border-box;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        
        #gameWrapper {
            width: 95vw;
            max-width: 850px;
            height: auto;
            max-height: 80dvh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #gameArea {
            width: 100%;
            height: 240px; 
            border-bottom: 5px solid #00f0ff; 
            background: #070913;
            position: relative;
            overflow: hidden;
            box-shadow: 0px 0px 40px rgba(0, 240, 255, 0.3);
            border-radius: 12px;
        }

        #scoreBoard {
            position: absolute;
            top: 12px;
            left: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #00d2ff, 0 0 20px #00d2ff;
            z-index: 8;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        
        #highScoreTextLive {
            font-size: 16px;
            color: #00f0ff;
            opacity: 0.9;
        }

        /* --- ОБЪЕМНЫЙ КОСМИЧЕСКИЙ ФОН --- */
        .space-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }
        .nebula {
            background: radial-gradient(circle at 80% 20%, rgba(122, 29, 253, 0.25) 0%, transparent 50%),
                        radial-gradient(circle at 20% 70%, rgba(0, 240, 255, 0.15) 0%, transparent 45%);
        }
        .planet-saturn {
            position: absolute;
            top: 15px; right: 120px; width: 55px; height: 55px;
            background: radial-gradient(circle at 30% 30%, #ffaa00, #883300);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.4);
        }
        .planet-saturn::before {
            content: ''; position: absolute; top: 22px; left: -10px; width: 75px; height: 5px;
            background: rgba(255, 200, 100, 0.5); border-radius: 50%; transform: rotate(-15deg);
        }
        .planet-small {
            position: absolute; top: 100px; left: 250px; width: 22px; height: 22px;
            background: radial-gradient(circle at 30% 30%, #00ffcc, #004433);
            border-radius: 50%; box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }
        .star { position: absolute; background: white; border-radius: 50%; box-shadow: 0 0 8px white; }

        /* --- УВЕЛИЧЕННЫЙ ПЕРСОНАЖ (В 2 РАЗА БОЛЬШЕ) --- */
        #playerContainer {
            width: 150px; /* Было 75px */
            height: 190px; /* Было 95px */
            position: absolute;
            bottom: 0;
            left: 40px; /* Чуть-чуть сдвинули левее для баланса массы */
            display: flex;
            align-items: flex-end;
            z-index: 5;
        }
        #catdog {
            width: 100%;
            height: 100%;
            background: url('catdog.png') no-repeat center bottom;
            background-size: contain;
        }
        
        /* Препятствие оставляем прежним */
        #obstacleContainer {
            width: 65px;
            height: 43px;
            position: absolute;
            bottom: 0;
            right: -100px;
            display: flex;
            align-items: flex-end;
            z-index: 5;
        }
        #obstacle {
            width: 100%;
            height: 100%;
            background: url('obstacle.png') no-repeat center bottom;
            background-size: contain;
        }
        
        /* --- ЭКРАН GAME OVER --- */
        #gameOverScreen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(7, 9, 19, 0.95) 40%, rgba(7, 9, 19, 0.4) 100%), 
                        url('gameover_bg.jpg') no-repeat right 35%;
            background-size: contain;
            z-index: 10;
            box-sizing: border-box;
            padding-left: 5%;
            align-items: center;
            justify-content: flex-start;
        }

        #gameOverBox {
            background: rgba(15, 18, 36, 0.85);
            padding: 15px 30px;
            border-radius: 16px;
            border: 2px solid #ff0055;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.4);
            text-align: center;
            backdrop-filter: blur(5px);
        }

        #gameOverText {
            font-size: 34px;
            color: #ff0055;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 0, 85, 0.6);
            margin: 0 0 5px 0;
        }

        #finalScoreText {
            font-size: 18px;
            color: #fff;
            margin: 0 0 2px 0;
        }

        #rankText {
            font-size: 16px;
            color: #ffea00;
            margin: 0 0 8px 0;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(255, 234, 0, 0.4);
        }

        #bestScoreText {
            font-size: 15px;
            color: #00ffcc;
            margin: 0 0 12px 0;
            font-weight: bold;
        }

        #restartHint {
            font-size: 14px; 
            color: #00d2ff;
            font-weight: bold;
        }

        /* --- БЛОКИРОВЩИК ВЕРТИКАЛЬНОГО ЭКРАНА --- */
        #orientationOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #070913;
            z-index: 9999;
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .rotate-icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: rotateAnim 2s infinite ease-in-out;
        }
        @keyframes rotateAnim {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }
        @media (orientation: portrait) and (max-width: 900px) {
            #orientationOverlay { display: flex; }
        }
    </style>
</head>
<body>

<div id="orientationOverlay">
    <div class="rotate-icon">🔄</div>
    <h2>Пожалуйста, переверните телефон горизонтально</h2>
    <p>Для комфортной игры необходим альбомный режим</p>
</div>

<div id="gameWrapper">
    <div id="gameArea">
        <div id="scoreBoard">
            <div>Очки: <span id="score">0</span></div>
            <div id="highScoreTextLive">Рекорд: <span id="liveHighScore">0</span></div>
        </div>

        <div class="space-bg nebula"></div>
        <div class="planet-saturn"></div>
        <div class="planet-small"></div>
        
        <div class="star" style="top: 30px; left: 80px; width: 3px; height: 3px; opacity: 0.9;"></div>
        <div class="star" style="top: 120px; left: 400px; width: 2px; height: 2px; opacity: 0.6;"></div>
        <div class="star" style="top: 60px; left: 700px; width: 4px; height: 4px; opacity: 0.8;"></div>

        <div id="playerContainer">
            <div id="catdog"></div>
        </div>
        
        <div id="obstacleContainer">
            <div id="obstacle"></div>
        </div>
        
        <div id="gameOverScreen">
            <div id="gameOverBox">
                <h1 id="gameOverText">GAME OVER</h1>
                <div id="finalScoreText">Ваш результат: 0 очков</div>
                <div id="rankText">Ранг: Космический кадет</div>
                <div id="bestScoreText">Рекорд: 0 очков</div>
                <div id="restartHint">Тапни по экрану для перезапуска</div>
            </div>
        </div>
    </div>
</div>

<script>
    const gameArea = document.getElementById('gameArea');
    const playerContainer = document.getElementById('playerContainer');
    const obstacleContainer = document.getElementById('obstacleContainer');
    const scoreElement = document.getElementById('score');
    const liveHighScoreElement = document.getElementById('liveHighScore');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScoreText = document.getElementById('finalScoreText');
    const rankText = document.getElementById('rankText');
    const bestScoreText = document.getElementById('bestScoreText');

    let isJumping = false;
    let gravity = 0.55; 
    let position = 0; 
    let speedY = 0;   

    let obstacleLeft = 900;
    let obstacleSpeed = 7.5;
    let score = 0;
    let isGameOver = false;

    let highScore = localStorage.getItem('corgiRunnerHighScore') ? parseInt(localStorage.getItem('corgiRunnerHighScore')) : 0;
    liveHighScoreElement.innerText = highScore;

    function jump() {
        if (isJumping) {
            speedY -= gravity; 
            position += speedY;

            if (position <= 0) {
                position = 0;
                speedY = 0;
                isJumping = false;
            }
            playerContainer.style.bottom = position + 'px';
        }
    }

    function gameLoop() {
        if (isGameOver) return;

        jump();

        obstacleLeft -= obstacleSpeed;
        if (obstacleLeft < -100) {
            obstacleLeft = gameArea.clientWidth + 20; 
            score++;            
            scoreElement.innerText = score;
            if (obstacleSpeed < 17) obstacleSpeed += 0.3; 
        }
        obstacleContainer.style.left = obstacleLeft + 'px';

        // КОРРЕКЦИЯ ХИТБОКСА ПОД НОВЫЙ БОЛЬШОЙ РАЗМЕР ПЕРСОНАЖА
        // Персонаж теперь шире (150px) и стоит на X-координате от 40px до 190px.
        // Корги задевает его, если левый край препятствия пересекает эту зону на малой высоте.
        if (obstacleLeft > 15 && obstacleLeft < 170) {
            if (position < 40) {
                isGameOver = true;
                handleGameOver();
            }
        }

        requestAnimationFrame(gameLoop);
    }

    function getSpaceRank(points) {
        if (points < 10) return { title: "🚀 Космический кадет", color: "#a0a5c0" };
        if (points < 20) return { title: "🛸 Звёздный пилот", color: "#00d2ff" };
        if (points < 30) return { title: "⭐ Опытный рейнджер", color: "#00ffcc" };
        if (points < 40) return { title: "🌌 Мастер орбит", color: "#ffaa00" };
        if (points < 50) return { title: "🔥 Галактический ас", color: "#ff0055" };
        return { title: "👑 Повелитель вселенной", color: "#ffea00" };
    }

    function handleGameOver() {
        let isNewRecord = false;
        
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('corgiRunnerHighScore', highScore);
            liveHighScoreElement.innerText = highScore;
            isNewRecord = true;
        }

        finalScoreText.innerText = `Ваш результат: ${score} ${getOchkiWord(score)}`;
        
        const currentRank = getSpaceRank(score);
        rankText.innerText = `Ранг: ${currentRank.title}`;
        rankText.style.color = currentRank.color;
        rankText.style.textShadow = `0 0 10px ${currentRank.color}66`;

        if (isNewRecord) {
            bestScoreText.innerText = `🎉 НОВЫЙ РЕКОРД! 🎉`;
            bestScoreText.style.color = '#00ff3c';
        } else {
            bestScoreText.innerText = `Лучший результат: ${highScore} ${getOchkiWord(highScore)}`;
            bestScoreText.style.color = '#00ffcc';
        }

        gameOverScreen.style.display = 'flex';
    }

    function getOchkiWord(number) {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        if (lastTwoDigits >= 11 && lastTwoDigits <= 19) return 'очков';
        if (lastDigit === 1) return 'очко';
        if (lastDigit >= 2 && lastDigit <= 4) return 'очка';
        return 'очков';
    }

    function handleAction() {
        if (window.innerHeight > window.innerWidth && window.innerWidth < 900) return;

        if (isGameOver) {
            isGameOver = false;
            gameOverScreen.style.display = 'none';
            obstacleLeft = gameArea.clientWidth + 20;
            score = 0;
            scoreElement.innerText = score;
            obstacleSpeed = 7.5;
            position = 0;
            isJumping = false;
            playerContainer.style.bottom = '0px';
            requestAnimationFrame(gameLoop);
        } else if (!isJumping) {
            isJumping = true;
            speedY = 12.5; 
        }
    }

    document.addEventListener('touchstart', function(e) {
        e.preventDefault();
        handleAction();
    }, { passive: false });

    document.addEventListener('keydown', function(event) {
        if (event.code === 'Space') {
            handleAction();
        }
    });

    setTimeout(() => {
        obstacleLeft = gameArea.clientWidth + 20;
    }, 100);

    requestAnimationFrame(gameLoop);
</script>

</body>
</html>
